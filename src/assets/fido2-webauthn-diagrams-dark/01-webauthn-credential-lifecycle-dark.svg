<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowReg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowAuth" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#0b1120"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">The WebAuthn Credential Lifecycle</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#94a3b8">Two ceremonies: Registration creates the keypair • Authentication proves ownership</text>

  <!-- Actor boxes -->
  <g>
    <rect x="60" y="90" width="200" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="160" y="117" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">Relying Party Server</text>

    <rect x="400" y="90" width="200" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="500" y="117" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">Browser (WebAuthn API)</text>

    <rect x="740" y="90" width="200" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="840" y="117" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">Authenticator</text>
  </g>

  <!-- Lifelines -->
  <line x1="160" y1="134" x2="160" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="500" y1="134" x2="500" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="840" y1="134" x2="840" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- REGISTRATION section background -->
  <rect x="40" y="155" width="920" height="240" rx="8" fill="#172554" stroke="#1e3a8a" stroke-width="1" opacity="0.4"/>
  <rect x="40" y="155" width="920" height="26" rx="8" fill="#1d4ed8"/>
  <rect x="40" y="169" width="920" height="12" fill="#1d4ed8"/>
  <text x="56" y="174" font-size="13" font-weight="700" fill="#ffffff">REGISTRATION — navigator.credentials.create()</text>

  <!-- Registration messages -->
  <g font-size="11" fill="#e2e8f0">
    <!-- 1. Challenge -->
    <line x1="160" y1="210" x2="492" y2="210" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrowReg)"/>
    <text x="326" y="205" text-anchor="middle" font-weight="600">1. challenge + rp.id + user</text>

    <!-- 2. create() call -->
    <line x1="500" y1="245" x2="832" y2="245" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrowReg)"/>
    <text x="666" y="240" text-anchor="middle" font-weight="600">2. create() request</text>

    <!-- 3. Authenticator action -->
    <rect x="760" y="260" width="160" height="48" rx="4" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
    <text x="840" y="277" text-anchor="middle" font-size="10.5" font-weight="600" fill="#93c5fd">Generate keypair</text>
    <text x="840" y="292" text-anchor="middle" font-size="10" fill="#cbd5e1">sign challenge,</text>
    <text x="840" y="304" text-anchor="middle" font-size="10" fill="#cbd5e1">build attestationObject</text>

    <!-- 4. Response to browser -->
    <line x1="840" y1="330" x2="508" y2="330" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrowReg)"/>
    <text x="674" y="325" text-anchor="middle" font-weight="600">3. PublicKeyCredential</text>
    <text x="674" y="342" text-anchor="middle" font-size="10" fill="#cbd5e1">{attestationObject, clientDataJSON}</text>

    <!-- 5. Response to server -->
    <line x1="500" y1="372" x2="168" y2="372" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrowReg)"/>
    <text x="334" y="367" text-anchor="middle" font-weight="600">4. Server stores public key</text>
  </g>

  <!-- AUTHENTICATION section background -->
  <rect x="40" y="420" width="920" height="240" rx="8" fill="#052e2b" stroke="#064e3b" stroke-width="1" opacity="0.4"/>
  <rect x="40" y="420" width="920" height="26" rx="8" fill="#047857"/>
  <rect x="40" y="434" width="920" height="12" fill="#047857"/>
  <text x="56" y="439" font-size="13" font-weight="700" fill="#ffffff">AUTHENTICATION — navigator.credentials.get()</text>

  <!-- Authentication messages -->
  <g font-size="11" fill="#e2e8f0">
    <!-- 1. Challenge -->
    <line x1="160" y1="475" x2="492" y2="475" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrowAuth)"/>
    <text x="326" y="470" text-anchor="middle" font-weight="600">1. new challenge + allowCredentials</text>

    <!-- 2. get() call -->
    <line x1="500" y1="510" x2="832" y2="510" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrowAuth)"/>
    <text x="666" y="505" text-anchor="middle" font-weight="600">2. get() request</text>

    <!-- 3. Authenticator action -->
    <rect x="760" y="525" width="160" height="48" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
    <text x="840" y="542" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6ee7b7">Sign challenge with</text>
    <text x="840" y="557" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6ee7b7">stored private key</text>
    <text x="840" y="569" text-anchor="middle" font-size="9.5" fill="#cbd5e1">increment signCount</text>

    <!-- 4. Response to browser -->
    <line x1="840" y1="595" x2="508" y2="595" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrowAuth)"/>
    <text x="674" y="590" text-anchor="middle" font-weight="600">3. PublicKeyCredential</text>
    <text x="674" y="607" text-anchor="middle" font-size="10" fill="#cbd5e1">{authenticatorData, signature, clientDataJSON}</text>

    <!-- 5. Response to server -->
    <line x1="500" y1="637" x2="168" y2="637" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrowAuth)"/>
    <text x="334" y="632" text-anchor="middle" font-weight="600">4. Server verifies signature</text>
  </g>

  <!-- Legend at bottom -->
  <g font-size="10.5" fill="#cbd5e1">
    <rect x="60" y="690" width="14" height="10" fill="#60a5fa"/>
    <text x="82" y="699">Registration (one-time)</text>
    <rect x="240" y="690" width="14" height="10" fill="#34d399"/>
    <text x="262" y="699">Authentication (every login)</text>
  </g>
</svg>
