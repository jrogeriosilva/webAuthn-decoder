<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <rect width="1000" height="640" fill="#0b1120"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">Anatomy of a PublicKeyCredential</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#94a3b8">Structure returned by both WebAuthn ceremonies — fields differ by type</text>

  <!-- Root node -->
  <rect x="380" y="90" width="240" height="56" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="500" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">PublicKeyCredential</text>
  <text x="500" y="133" text-anchor="middle" font-size="11" fill="#94a3b8">returned by create() / get()</text>

  <!-- Branch lines from root -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <path d="M 500 146 L 500 170 L 160 170 L 160 200"/>
    <path d="M 500 170 L 340 170 L 340 200"/>
    <path d="M 500 170 L 500 200"/>
  </g>

  <!-- id / rawId -->
  <rect x="60" y="200" width="200" height="80" rx="6" fill="#1e293b" stroke="#334155"/>
  <rect x="60" y="200" width="200" height="24" rx="6" fill="#334155"/>
  <rect x="60" y="212" width="200" height="12" fill="#334155"/>
  <text x="160" y="217" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">id  /  rawId</text>
  <text x="160" y="244" text-anchor="middle" font-size="10.5" fill="#e2e8f0">Unique credential</text>
  <text x="160" y="258" text-anchor="middle" font-size="10.5" fill="#e2e8f0">identifier</text>
  <text x="160" y="273" text-anchor="middle" font-size="9.5" fill="#94a3b8" font-style="italic">base64url / ArrayBuffer</text>

  <!-- type -->
  <rect x="280" y="200" width="120" height="80" rx="6" fill="#1e293b" stroke="#334155"/>
  <rect x="280" y="200" width="120" height="24" rx="6" fill="#334155"/>
  <rect x="280" y="212" width="120" height="12" fill="#334155"/>
  <text x="340" y="217" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">type</text>
  <text x="340" y="250" text-anchor="middle" font-size="10.5" fill="#e2e8f0">"public-key"</text>

  <!-- response (central branch) -->
  <rect x="420" y="200" width="160" height="56" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="500" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">response</text>
  <text x="500" y="243" text-anchor="middle" font-size="10" fill="#94a3b8">ceremony payload</text>

  <!-- Branch lines from response -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <path d="M 500 256 L 500 290 L 100 290 L 100 320"/>
    <path d="M 500 290 L 280 290 L 280 320"/>
    <path d="M 500 290 L 500 320"/>
    <path d="M 500 290 L 720 290 L 720 320"/>
    <path d="M 500 290 L 900 290 L 900 320"/>
  </g>

  <!-- Legend for color coding -->
  <g transform="translate(40, 540)">
    <rect x="0" y="0" width="920" height="76" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="16" y="22" font-size="12" font-weight="700" fill="#f1f5f9">Field availability by ceremony:</text>
    <rect x="16" y="34" width="14" height="14" fill="#2563eb" rx="2"/>
    <text x="38" y="46" font-size="11" fill="#e2e8f0">Registration only (create)</text>
    <rect x="210" y="34" width="14" height="14" fill="#059669" rx="2"/>
    <text x="232" y="46" font-size="11" fill="#e2e8f0">Authentication only (get)</text>
    <rect x="410" y="34" width="14" height="14" fill="#64748b" rx="2"/>
    <text x="432" y="46" font-size="11" fill="#e2e8f0">Both ceremonies</text>
    <text x="16" y="66" font-size="10.5" fill="#94a3b8" font-style="italic">Note: authenticatorData is also embedded inside attestationObject during registration.</text>
  </g>

  <!-- attestationObject (Registration only) -->
  <rect x="40" y="320" width="160" height="100" rx="6" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="40" y="320" width="160" height="24" rx="6" fill="#2563eb"/>
  <rect x="40" y="332" width="160" height="12" fill="#2563eb"/>
  <text x="120" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">attestationObject</text>
  <text x="120" y="362" text-anchor="middle" font-size="10" fill="#93c5fd" font-weight="600">CBOR-encoded map</text>
  <text x="120" y="378" text-anchor="middle" font-size="9.5" fill="#e2e8f0">{ fmt, authData,</text>
  <text x="120" y="390" text-anchor="middle" font-size="9.5" fill="#e2e8f0">attStmt }</text>
  <text x="120" y="410" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">proves authenticator model</text>

  <!-- authenticatorData (Authentication only) -->
  <rect x="220" y="320" width="160" height="100" rx="6" fill="#052e2b" stroke="#059669" stroke-width="1.5"/>
  <rect x="220" y="320" width="160" height="24" rx="6" fill="#059669"/>
  <rect x="220" y="332" width="160" height="12" fill="#059669"/>
  <text x="300" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">authenticatorData</text>
  <text x="300" y="362" text-anchor="middle" font-size="10" fill="#6ee7b7" font-weight="600">Raw binary (not CBOR)</text>
  <text x="300" y="378" text-anchor="middle" font-size="9.5" fill="#e2e8f0">rpIdHash, flags,</text>
  <text x="300" y="390" text-anchor="middle" font-size="9.5" fill="#e2e8f0">signCount, ...</text>
  <text x="300" y="410" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">manually packed layout</text>

  <!-- clientDataJSON (Both) -->
  <rect x="420" y="320" width="160" height="100" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <rect x="420" y="320" width="160" height="24" rx="6" fill="#64748b"/>
  <rect x="420" y="332" width="160" height="12" fill="#64748b"/>
  <text x="500" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">clientDataJSON</text>
  <text x="500" y="362" text-anchor="middle" font-size="10" fill="#cbd5e1" font-weight="600">base64url UTF-8 JSON</text>
  <text x="500" y="378" text-anchor="middle" font-size="9.5" fill="#e2e8f0">{ type, challenge,</text>
  <text x="500" y="390" text-anchor="middle" font-size="9.5" fill="#e2e8f0">origin, crossOrigin }</text>
  <text x="500" y="410" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">set by the browser</text>

  <!-- signature (Authentication only) -->
  <rect x="640" y="320" width="160" height="100" rx="6" fill="#052e2b" stroke="#059669" stroke-width="1.5"/>
  <rect x="640" y="320" width="160" height="24" rx="6" fill="#059669"/>
  <rect x="640" y="332" width="160" height="12" fill="#059669"/>
  <text x="720" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">signature</text>
  <text x="720" y="362" text-anchor="middle" font-size="10" fill="#6ee7b7" font-weight="600">Over authData ‖</text>
  <text x="720" y="376" text-anchor="middle" font-size="10" fill="#6ee7b7" font-weight="600">SHA-256(clientDataJSON)</text>
  <text x="720" y="396" text-anchor="middle" font-size="9.5" fill="#e2e8f0">signed by private key</text>
  <text x="720" y="410" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">server verifies this</text>

  <!-- userHandle (Authentication only) -->
  <rect x="820" y="320" width="160" height="100" rx="6" fill="#052e2b" stroke="#059669" stroke-width="1.5"/>
  <rect x="820" y="320" width="160" height="24" rx="6" fill="#059669"/>
  <rect x="820" y="332" width="160" height="12" fill="#059669"/>
  <text x="900" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">userHandle</text>
  <text x="900" y="362" text-anchor="middle" font-size="10" fill="#6ee7b7" font-weight="600">Opaque user ID</text>
  <text x="900" y="382" text-anchor="middle" font-size="9.5" fill="#e2e8f0">returned to locate</text>
  <text x="900" y="394" text-anchor="middle" font-size="9.5" fill="#e2e8f0">server-side account</text>
  <text x="900" y="412" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">set during registration</text>

  <!-- Downward arrow to imply these are nested inside response -->
  <text x="500" y="460" text-anchor="middle" font-size="10.5" fill="#94a3b8" font-style="italic">All five boxes above are properties of response</text>
</svg>
